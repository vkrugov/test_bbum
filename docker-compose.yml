services:
  app:
    build: ./
    ports:
      - "8080:80"
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - ./logs:/var/www/html/logs
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  scheduler:
    build: ./
    command: ["sh", "-c", "while true; do php /var/www/html/cron.php; sleep 60; done"]
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - ./logs:/var/www/html/logs
    depends_on:
      - redis

volumes:
  redis-data:
